# Cross-file call + reverse-impact (blast). Validates the resolver's
# global cross-file name resolution (the case Synaptic's Rust path gets
# only 50% on).
family = "scripting-python"

[[call_edge]]
from = "pkg/app.py::run"
to = "pkg/util.py::helper"

[[blast]]
seed = "pkg/util.py::helper"
affects = ["pkg/app.py::run"]
not_affected = ["pkg/util.py::other"]
