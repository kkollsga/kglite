# Cross-FILE Rust call resolution — `caller` in lib.rs calls `util::helper`
# defined in util.rs. This is the case Synaptic resolves at only ~50%
# (intra-file limit); our global name resolution should pin it.
family = "systems-rust"

[[call_edge]]
from = "src/lib.rs::caller"
to = "src/util.rs::helper"

[[blast]]
seed = "src/util.rs::helper"
affects = ["src/lib.rs::caller"]
not_affected = ["src/util.rs::other"]
