# Inheritance-aware resolution: Derived.caller's self.run() resolves to the
# inherited Base.run, NOT the unrelated Other.run. The single labeled edge
# means any connection to Other.run is a precision failure.
family = "scripting-python"

[[call_edge]]
from = "pkg/a.py::Derived.caller"
to = "pkg/a.py::Base.run"   # the inherited one; Other.run must not connect
