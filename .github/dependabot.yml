version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    groups:
      github-actions:
        patterns: ["*"]
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    groups:
      pip-deps:
        patterns: ["*"]
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    commit-message:
      prefix: "chore"
    groups:
      cargo-deps:
        patterns: ["*"]
        # Routine updates belong in one low-risk PR. Breaking migrations must
        # arrive separately so CI failures identify the dependency involved.
        update-types: ["minor", "patch"]
    ignore:
      # KGLite persistence is Postcard-only. crates.io's bincode 3.0.0 is an
      # intentionally uncompilable sentinel, and no bincode release belongs
      # in the dependency graph after the 0.14 format break.
      - dependency-name: "bincode"
