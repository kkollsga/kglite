name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Heavy race/stress verification stays off the per-PR critical path.
    - cron: '23 3 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: dtolnay/rust-toolchain@stable
      - name: Install documentation dependencies
        run: pip install -r docs/requirements.txt
      - name: Check generated documentation facts
        run: python scripts/render_docs_facts.py --check
      - name: Build HTML documentation with warnings as errors
        run: sphinx-build -W --keep-going -b html docs docs/_build/html

  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        # Swatinem/rust-cache@v2, matching the Python/Perf jobs (migrated in
        # 0.9.52). The old actions/cache@v5 cached the whole `target/` dir
        # unpruned (~3.5 GB via the broad restore-keys fallback), which
        # occasionally failed the cache-restore `tar` with a partial write
        # ("Wrote only N of M bytes") and took the job down. Swatinem prunes
        # the cache (drops workspace-crate artifacts + incremental) and
        # treats a restore failure as non-fatal.
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-checks
          workspaces: ". -> target"

      - name: Check formatting
        run: cargo fmt -- --check

      - name: API chokepoint gate
        # Enforce the kglite::api single-chokepoint boundary: server crates
        # stay at zero below-api reaches; the wheel's reach count can only
        # shrink from its frozen baseline (docs/history/roadmap-2026H1.md).
        run: ./scripts/check_api_chokepoint.sh

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run Rust tests
        run: cargo test

  kglite-c:
    name: kglite-c (C ABI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry & target
        # Swatinem/rust-cache@v2 — see the Rust-checks job for why (the old
        # actions/cache@v5 of the full target/ dir flaked on restore).
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: kglite-c
          workspaces: ". -> target"

      # Build + lint + test with every dataset feature on. fastembed
      # is off here because it pulls a ~200 MB ONNX runtime we don't
      # want on every CI run; the default-feature build below
      # verifies the no-fastembed path stays compilable.
      - name: Clippy (sec + sodir + wikidata + rdf)
        run: cargo clippy -p kglite-c --all-targets --features sec,sodir,wikidata,rdf -- -D warnings

      - name: Tests (sec + sodir + wikidata + rdf)
        run: cargo test -p kglite-c --features sec,sodir,wikidata,rdf

      # Default-feature build — what consumers get without opting
      # into any dataset / embedder feature. Keeps the no-extras
      # path honest.
      - name: Clippy (default features)
        run: cargo clippy -p kglite-c --all-targets -- -D warnings

      - name: Tests (default features)
        run: cargo test -p kglite-c

      # Header-drift gate — cbindgen runs in build.rs and writes
      # include/kglite.h. We commit that file (binding consumers
      # point at it directly without rebuilding kglite-c). CI must
      # verify the committed copy matches a fresh cbindgen run, or
      # any Go / JS / JVM binding compiled against the wrong header
      # silently mismatches the library.
      - name: Header drift gate (cbindgen vs committed)
        run: |
          # Force a clean regen by removing the header, building
          # with all features on (the union surface), and diffing
          # against the committed copy.
          rm -f crates/kglite-c/include/kglite.h
          touch crates/kglite-c/build.rs
          cargo build -p kglite-c --features sec,sodir,wikidata,fastembed,rdf
          git diff --exit-code -- crates/kglite-c/include/kglite.h || {
            echo "::error::Committed include/kglite.h is out of date — re-run 'cargo build -p kglite-c --features sec,sodir,wikidata,fastembed,rdf' and commit the result."
            exit 1
          }

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  python-tests:
    name: Python tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache cargo registry & target
        # 0.9.52: switched from actions/cache@v5 to Swatinem/rust-cache@v2.
        # The Swatinem action is purpose-built for cargo — it knows how
        # to handle target/ (drops stale incremental artifacts, keeps
        # build-script outputs), sets CARGO_INCREMENTAL/RUSTC_WRAPPER
        # sanely, and uses a smarter cache key that lets unrelated
        # changes hit the cache. Wheels workflow has been using it since
        # 0.9.22; this brings CI in line.
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: py${{ matrix.python-version }}
          workspaces: ". -> target"

      - name: Install dependencies
        run: pip install maturin pytest pytest-cov pandas hypothesis

      - name: Install pyarrow for the coexistence canary (newest-python leg only)
        # Only the newest-python leg installs pyarrow, so tests/test_pyarrow_coexistence.py
        # actually runs somewhere in CI instead of skipping on every leg. It guards
        # against the dual-allocator teardown SIGSEGV (kglite + pyarrow's bundled
        # mimalloc), fixed by pinning our mimalloc to v2.
        #
        # UNPINNED BY DESIGN: this is a canary. We WANT the newest pyarrow release
        # (and, on 3.14, the newest CPython allocator behaviour) so a future
        # pyarrow/CPython change that reintroduces the clash trips this leg early.
        # Do not pin it.
        if: matrix.python-version == '3.14'
        run: pip install pyarrow

      - name: Build and install extension with integration extras
        # [networkx] keeps the bridge suite active instead of import-skipping;
        # [neo4j] supplies the Bolt client used by the protocol smoke tests.
        # The MCP server is bundled Rust code and has no Python extra.
        run: pip install -e '.[neo4j,networkx]'

      - name: Build kglite-mcp-server + kglite-bolt-server binaries + kglite cdylib
        # Both protocol smoke suites skip when their standalone binary is
        # absent, so materialize the current MCP and Bolt adapters explicitly.
        #
        # `-p kglite` (in addition to the server binaries) explicitly
        # forces the libkglite cdylib to build. Cargo only needs the
        # rlib when kglite is consumed as a workspace dep, and may skip
        # the cdylib to save time — but the binary_size gate below
        # reads the cdylib's file size, so we must materialise it.
        run: cargo build --release -p kglite-mcp-server -p kglite-bolt-server -p kglite

      - name: Smoke-test the NetworkX extra from an installed wheel
        if: matrix.python-version == '3.12'
        run: |
          rm -rf /tmp/kglite-networkx-wheel /tmp/kglite-networkx-smoke
          maturin build --release --out /tmp/kglite-networkx-wheel
          wheel="$(find /tmp/kglite-networkx-wheel -name '*.whl' -print -quit)"
          python -m venv /tmp/kglite-networkx-smoke
          /tmp/kglite-networkx-smoke/bin/pip install "${wheel}[networkx]"
          cd /tmp
          /tmp/kglite-networkx-smoke/bin/python -c "import networkx as nx; import pandas; import kglite; graph = kglite.from_networkx(nx.path_graph(3)); assert graph.to_networkx().number_of_nodes() == 3"

      - name: Prefetch all-feature dependency metadata
        # The dependency-license contract deliberately reruns metadata offline.
        # Populate crates used only by optional features before that gate runs.
        run: cargo metadata --format-version 1 --locked --all-features > /dev/null

      - name: Run Python tests
        run: pytest tests/ -v --tb=short --cov=kglite --cov-report=xml

      - name: Run Bolt smoke + correctness + robustness tests
        # Covers handshake, scalars, params, Node/Rel, transactions, auth,
        # FAILURE mapping, and robustness. `not benchmark` excludes the
        # dual-marked `bolt+benchmark` perf suite at
        # `tests/benchmarks/test_bench_bolt.py` — those need the
        # `pytest-benchmark` plugin which CI doesn't install (perf
        # baselines are captured locally via
        # `make refresh-release-constants`, not gated in CI).
        run: pytest tests/ -m "bolt and not benchmark" -v --tb=short

      - name: Run binary-size gate
        # The structural gates (god-file, unsafe-SAFETY, enum-match,
        # mod_rs purity, recording-symbol-export) run inside the regular
        # `pytest tests/` step above — they're unmarked since they're
        # pure file scans. test_binary_size_regression needs the release
        # artifact built above, so it carries `@pytest.mark.binary_size`
        # and runs in this dedicated step.
        run: pytest tests/test_phase5_parity.py -m binary_size -v

      - name: Run stubtest
        if: matrix.python-version == '3.12'
        run: |
          pip install mypy pandas-stubs
          python -m mypy.stubtest kglite --ignore-missing-stub --ignore-unused-allowlist --mypy-config-file mypy_stubtest.ini --allowlist stubtest_allowlist.txt

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  free-threading:
    name: Free-threading (no-GIL) smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up free-threaded Python 3.13t
        uses: actions/setup-python@v6
        with:
          python-version: '3.13t'

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: free-threading
          workspaces: ". -> target"

      - name: Build extension into a free-threaded venv (abi3 off)
        # abi3 (the limited API) doesn't cover the free-threaded build, so the
        # extension is built per-version with `--no-default-features` (drops the
        # `abi3` default) + `python-extension,loaders,mcp-server` (re-adds the
        # default loaders/server the wheel ships, minus abi3). The build itself is
        # a real test: PyO3 0.28 enforces `Sync` on every `#[pyclass]` for a
        # free-threaded target, so a non-thread-safe class fails to compile here.
        #
        # Use `maturin develop` (not `build` + `pip install <wheel>`): it
        # compiles the extension editable-into the local `kglite/` package dir,
        # so `import kglite` from the repo root resolves to the freshly built
        # `.so`. A plain `pip install <wheel>` leaves the source-tree `kglite/`
        # (which has no compiled extension) shadowing the installed package →
        # `ModuleNotFoundError: No module named 'kglite.kglite'`.
        run: |
          python -m venv .ftvenv
          ./.ftvenv/bin/pip install -q maturin pytest pandas
          VIRTUAL_ENV="$PWD/.ftvenv" ./.ftvenv/bin/maturin develop --release \
            --no-default-features --features python-extension,loaders,mcp-server

      - name: Assert GIL is actually disabled + run concurrency suite
        # Backs the module's `gil_used = false` declaration with a real run:
        # imports under no-GIL, asserts the GIL stays off under a threaded
        # query load, and exercises the shared Session / FrozenGraph model.
        run: |
          ./.ftvenv/bin/python -c "import sys, kglite; assert not sys._is_gil_enabled(), 'GIL unexpectedly enabled'; print('no-GIL OK')"
          ./.ftvenv/bin/python -m pytest tests/test_freethreading.py tests/test_concurrency.py tests/test_session.py -v --tb=short

  perf-regression:
    name: Perf regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: perf
          workspaces: ". -> target"

      - name: Set up venv (maturin develop needs one)
        # `maturin develop --release` is the standard way to install
        # the extension in release mode for development. It requires
        # an active venv. CI's actions/setup-python uses the system
        # Python, so we create `.venv` ourselves and prepend its bin
        # to PATH so every subsequent step picks up the venv's pip /
        # maturin / pytest. `.venv` is the directory name maturin
        # auto-detects, so no VIRTUAL_ENV export needed.
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install maturin pytest pytest-benchmark pandas

      - name: Build and install extension (release)
        run: maturin develop --release

      - name: Run tracked benchmarks
        # Match the harness shape from CLAUDE.md's performance protocol:
        # 100 rounds, warmup on, 20 warmup iterations. The JSON-dump path
        # is what compare_bench.py reads.
        run: |
          pytest tests/benchmarks/test_bench_core.py -m benchmark \
            --benchmark-min-rounds=100 \
            --benchmark-warmup=on --benchmark-warmup-iterations=20 \
            --benchmark-json=.bench-current.json

      - name: Compare against baseline
        # CI runs on Linux; the Linux baseline lives in current.linux.json.
        # macOS local development uses current.json (the platform divergence
        # is real — Linux GitHub runners run ~2-3x slower than Apple Silicon
        # for these benchmarks, so a single baseline can't gate both).
        run: |
          python scripts/compare_bench.py \
            tests/benchmarks/baselines/current.linux.json .bench-current.json \
            --metric min --threshold 20

  public-api:
    name: Public API gate
    runs-on: ubuntu-latest
    # Locks the public API surface of the `kglite` core crate (api:: + every
    # other `pub` item) against accidental signature changes that would break
    # downstream Rust embedders / the C ABI. Complements check_api_chokepoint.sh
    # (which gates *reaches past* the boundary, not the boundary's own shape)
    # and the kglite-c cbindgen header-drift gate.
    #
    # cargo-public-api needs nightly rustdoc-JSON, so this job pins a nightly
    # (the rest of CI is stable-only). Both pins below are the single source of
    # truth for CI; bump them together with a `make refresh-api-baseline` at
    # release time (see CLAUDE.md "Captured-constant refresh"). Keep
    # KGLITE_API_NIGHTLY in sync with the Makefile + refresh_release_constants.py.
    env:
      KGLITE_API_NIGHTLY: nightly-2026-07-01
      KGLITE_PUBLIC_API_VERSION: 0.49.0
    steps:
      - uses: actions/checkout@v7

      - name: Install pinned nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.KGLITE_API_NIGHTLY }}

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: public-api
          workspaces: ". -> target"

      - name: Install cargo-public-api (pinned)
        run: cargo install cargo-public-api --locked --version ${{ env.KGLITE_PUBLIC_API_VERSION }}

      - name: Diff public API against committed baseline
        # Baseline is generated with default features (rdf off) and `-ss`
        # (omit blanket + auto-trait impls) so it's platform-stable. A diff
        # means the kglite public surface changed — refresh & commit if intended.
        run: |
          RUSTUP_TOOLCHAIN=${{ env.KGLITE_API_NIGHTLY }} \
            cargo public-api -p kglite -ss > /tmp/kglite_api_current.txt
          if ! diff -u tests/api-baselines/kglite.txt /tmp/kglite_api_current.txt; then
            echo "::error::Public API of kglite changed vs tests/api-baselines/kglite.txt. If intentional, run 'make refresh-api-baseline' and commit the result."
            exit 1
          fi

  storage-parity:
    name: Cross-storage parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: storage-parity
          workspaces: ". -> target"
      - name: Build test extension
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          .venv/bin/pip install maturin pytest pandas
          .venv/bin/maturin develop --release
      - name: Run bounded memory/mapped/disk parity matrix
        run: |
          .venv/bin/pytest -m parity -v --tb=short \
            tests/test_storage_parity.py \
            tests/test_phase1_parity.py tests/test_phase2_parity.py \
            tests/test_phase3_parity.py tests/test_phase4_parity.py

  disk-concurrency:
    name: Disk concurrency regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: disk-concurrency
          workspaces: ". -> target"
      - name: Build test extension
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
          .venv/bin/pip install maturin pytest pandas
          .venv/bin/maturin develop --release
      - name: Run bounded disk ownership and arena regressions
        run: |
          .venv/bin/pytest -v --tb=short \
            tests/test_concurrency.py::TestConcurrentReads::test_concurrent_disk_reads_keep_materialized_nodes_alive \
            tests/test_disk_mutation_roundtrip.py::test_disk_writer_lease_is_enforced_across_processes \
            tests/test_disk_mutation_roundtrip.py::test_disk_parallel_projection_node_weight_is_race_free \
            tests/test_disk_mutation_roundtrip.py::test_disk_parallel_projection_no_interner_corruption \
            tests/test_session.py::test_disk_session_reuses_writer_lineage_and_composes

  native-lifecycle-locks:
    name: Native lifecycle locks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-lifecycle-${{ matrix.os }}
          workspaces: ". -> target"
      - name: Test core cross-process lease recovery
        run: cargo test -p kglite --lib graph::io::open::tests::crashed_process_releases_writer_lease -- --exact --nocapture
      - name: Test core lease-protected publication
        run: cargo test -p kglite --lib graph::io::open::tests::writer_lease_serializes_open_create_and_publish -- --exact
      - name: Test CLI lifecycle unit suite
        run: cargo test -p kglite-cli

  loom-session:
    name: Loom Session model
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: loom-session
          workspaces: ". -> target"
      - name: Explore Session lock interleavings
        run: RUSTFLAGS="--cfg loom" cargo test -p kglite --test loom_session

  miri-loaders:
    name: Miri unsafe loader checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Prepare Miri
        run: cargo miri setup
      - name: Check packed decoding and N-Triples parsing
        run: |
          cargo miri test -p kglite --lib packed_primitives_decode_from_misaligned_little_endian_bytes
          cargo miri test -p kglite --lib parse_line_borrowed_uri_boundaries_are_valid
          cargo miri test -p kglite --lib parse_line_preserves_utf8_literal_boundaries

  address-sanitizer:
    name: AddressSanitizer disk arenas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - name: Check packed decoding and arena lifetimes
        env:
          RUSTFLAGS: -Zsanitizer=address
          RUSTDOCFLAGS: -Zsanitizer=address
        run: |
          cargo test -p kglite --lib --target x86_64-unknown-linux-gnu packed_primitives_decode_from_misaligned_little_endian_bytes
          cargo test -p kglite --lib --target x86_64-unknown-linux-gnu overlapping_query_guards_keep_materializations_alive

  scheduled-thread-sanitizer:
    name: Scheduled ThreadSanitizer Session checks
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - name: Run Session and disk concurrency models under TSan
        env:
          RUSTFLAGS: -Zsanitizer=thread
          RUSTDOCFLAGS: -Zsanitizer=thread
        run: cargo test -p kglite --lib --target x86_64-unknown-linux-gnu graph::session

  ci-success:
    name: CI success
    # Single aggregate gate the publish workflows wait on. It fails if ANY CI
    # job failed or was cancelled, so a new CI job is covered just by adding it
    # to `needs` here — no more hand-maintained per-check allowlists in the two
    # publish workflows (the gap that let 0.11.6 ship to PyPI/crates.io while
    # the free-threading job was red: it simply wasn't in the allowlist).
    #
    # `if: always()` makes this run after every dependency regardless of their
    # outcome, so it always produces a definitive pass/fail check to wait on.
    needs:
      - docs
      - rust-checks
      - kglite-c
      - python-lint
      - python-tests
      - free-threading
      - perf-regression
      - public-api
      - storage-parity
      - disk-concurrency
      - native-lifecycle-locks
      - loom-session
      - miri-loaders
      - address-sanitizer
      - scheduled-thread-sanitizer
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all CI jobs passed
        run: |
          results="${{ join(needs.*.result, ',') }}"
          echo "CI job results: $results"
          case ",$results," in
            *,failure,* | *,cancelled,*)
              echo "::error::At least one CI job did not succeed — blocking release."
              exit 1
              ;;
            *)
              echo "All CI jobs succeeded."
              ;;
          esac
