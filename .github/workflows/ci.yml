name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        run: cargo test

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  python-tests:
    name: Python tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-py${{ matrix.python-version }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-py${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install maturin pytest pytest-cov pandas hypothesis

      - name: Build and install extension (with [mcp] extras)
        # 0.9.21+: install the [mcp] extras so the Python MCP server
        # integration tests in tests/test_mcp_server_python_entry.py
        # can run. Without these (mcp, pyyaml, aiohttp, fastembed,
        # watchdog), the server's _check_extras gate fires at boot
        # and the test suite times out trying to talk to a server
        # that exited immediately. The tests do also importorskip
        # gracefully, but installing the extras lets CI exercise the
        # real tool-surface baseline gate.
        run: pip install -e .[mcp]

      - name: Build kglite-mcp-server binary + kglite cdylib
        # 0.9.45+: kglite-mcp-server binary is needed by
        # tests/test_mcp_server_smoke.py, which is
        # `pytest.mark.skipif(not BINARY.exists())`. Without this step
        # the smoke test silently skips in CI — it's how the Rust
        # save_graph dispatch regression (0.9.20→0.9.44) went undetected.
        #
        # `-p kglite` (in addition to mcp-server) explicitly forces the
        # libkglite cdylib to build. Cargo only needs the rlib when
        # kglite is consumed as a workspace dep, and may skip the
        # cdylib to save time — but the binary_size gate below reads
        # the cdylib's file size, so we must materialise it.
        run: cargo build --release -p kglite-mcp-server -p kglite

      - name: Run Python tests
        run: pytest tests/ -v --tb=short --cov=kglite --cov-report=xml

      - name: Run binary-size gate
        # The structural gates (god-file, unsafe-SAFETY, enum-match,
        # mod_rs purity, recording-symbol-export) run inside the regular
        # `pytest tests/` step above — they're unmarked since they're
        # pure file scans. test_binary_size_regression needs the release
        # artifact built above, so it carries `@pytest.mark.binary_size`
        # and runs in this dedicated step.
        run: pytest tests/test_phase5_parity.py -m binary_size -v

      - name: Run stubtest
        if: matrix.python-version == '3.12'
        run: |
          pip install mypy pandas-stubs
          python -m mypy.stubtest kglite --ignore-missing-stub --ignore-unused-allowlist --mypy-config-file mypy_stubtest.ini --allowlist stubtest_allowlist.txt

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  perf-regression:
    name: Perf regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-perf-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-perf-

      - name: Install dependencies
        run: pip install maturin pytest pytest-benchmark pandas

      - name: Build and install extension (release)
        run: maturin develop --release

      - name: Run tracked benchmarks
        # Match the harness shape from CLAUDE.md's performance protocol:
        # 100 rounds, warmup on, 20 warmup iterations. The JSON-dump path
        # is what compare_bench.py reads.
        run: |
          pytest tests/benchmarks/test_bench_core.py -m benchmark \
            --benchmark-min-rounds=100 \
            --benchmark-warmup=on --benchmark-warmup-iterations=20 \
            --benchmark-json=.bench-current.json

      - name: Compare against baseline
        run: |
          python scripts/compare_bench.py \
            tests/benchmarks/baselines/current.json .bench-current.json \
            --metric min --threshold 20
