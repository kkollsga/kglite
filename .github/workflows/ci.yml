name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy -- -D warnings

      - name: Run Rust tests
        run: cargo test

  python-lint:
    name: Python lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install ruff
        run: pip install ruff

      - name: Check formatting
        run: ruff format --check .

      - name: Check linting
        run: ruff check .

  python-tests:
    name: Python tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Cache cargo registry & target
        # 0.9.52: switched from actions/cache@v5 to Swatinem/rust-cache@v2.
        # The Swatinem action is purpose-built for cargo — it knows how
        # to handle target/ (drops stale incremental artifacts, keeps
        # build-script outputs), sets CARGO_INCREMENTAL/RUSTC_WRAPPER
        # sanely, and uses a smarter cache key that lets unrelated
        # changes hit the cache. Wheels workflow has been using it since
        # 0.9.22; this brings CI in line.
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: py${{ matrix.python-version }}
          workspaces: ". -> target"

      - name: Install dependencies
        run: pip install maturin pytest pytest-cov pandas hypothesis

      - name: Build and install extension (with [mcp] + [neo4j] extras)
        # 0.9.21+: install the [mcp] extras so the Python MCP server
        # integration tests in tests/test_mcp_server_python_entry.py
        # can run. Without these (mcp, pyyaml, aiohttp, fastembed,
        # watchdog), the server's _check_extras gate fires at boot
        # and the test suite times out trying to talk to a server
        # that exited immediately. The tests do also importorskip
        # gracefully, but installing the extras lets CI exercise the
        # real tool-surface baseline gate.
        #
        # 0.10.x+: [neo4j] extra is needed for the Bolt-protocol smoke
        # tests in tests/test_bolt_server_smoke.py (Phase B contract —
        # all 8 currently xfail-strict against the unimplemented backend).
        run: pip install -e .[mcp,neo4j]

      - name: Build kglite-mcp-server + kglite-bolt-server binaries + kglite cdylib
        # 0.9.45+: kglite-mcp-server binary is needed by
        # tests/test_mcp_server_smoke.py, which is
        # `pytest.mark.skipif(not BINARY.exists())`. Without this step
        # the smoke test silently skips in CI — it's how the Rust
        # save_graph dispatch regression (0.9.20→0.9.44) went undetected.
        #
        # 0.10.x+: kglite-bolt-server binary built for the same reason —
        # tests/test_bolt_server_smoke.py has the same skipif-not-exists
        # gate. Phase C sub-phases will turn xfail → pass as they land;
        # without the binary built here, that signal would be invisible.
        #
        # `-p kglite` (in addition to the server binaries) explicitly
        # forces the libkglite cdylib to build. Cargo only needs the
        # rlib when kglite is consumed as a workspace dep, and may skip
        # the cdylib to save time — but the binary_size gate below
        # reads the cdylib's file size, so we must materialise it.
        run: cargo build --release -p kglite-mcp-server -p kglite-bolt-server -p kglite

      - name: Run Python tests
        run: pytest tests/ -v --tb=short --cov=kglite --cov-report=xml

      - name: Run Bolt smoke + correctness + robustness tests
        # Post-Phase-C: the original "failing-by-design" xfail-strict
        # tests pass cleanly; the bolt suite is real coverage now
        # (handshake, scalars, params, Node/Rel, transactions, auth,
        # FAILURE mapping, robustness). `not benchmark` excludes the
        # dual-marked `bolt+benchmark` perf suite at
        # `tests/benchmarks/test_bench_bolt.py` — those need the
        # `pytest-benchmark` plugin which CI doesn't install (perf
        # baselines are captured locally via
        # `make refresh-release-constants`, not gated in CI).
        run: pytest tests/ -m "bolt and not benchmark" -v --tb=short

      - name: Run binary-size gate
        # The structural gates (god-file, unsafe-SAFETY, enum-match,
        # mod_rs purity, recording-symbol-export) run inside the regular
        # `pytest tests/` step above — they're unmarked since they're
        # pure file scans. test_binary_size_regression needs the release
        # artifact built above, so it carries `@pytest.mark.binary_size`
        # and runs in this dedicated step.
        run: pytest tests/test_phase5_parity.py -m binary_size -v

      - name: Run stubtest
        if: matrix.python-version == '3.12'
        run: |
          pip install mypy pandas-stubs
          python -m mypy.stubtest kglite --ignore-missing-stub --ignore-unused-allowlist --mypy-config-file mypy_stubtest.ini --allowlist stubtest_allowlist.txt

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  perf-regression:
    name: Perf regression gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: perf
          workspaces: ". -> target"

      - name: Set up venv (maturin develop needs one)
        # `maturin develop --release` is the standard way to install
        # the extension in release mode for development. It requires
        # an active venv. CI's actions/setup-python uses the system
        # Python, so we create `.venv` ourselves and prepend its bin
        # to PATH so every subsequent step picks up the venv's pip /
        # maturin / pytest. `.venv` is the directory name maturin
        # auto-detects, so no VIRTUAL_ENV export needed.
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: pip install maturin pytest pytest-benchmark pandas

      - name: Build and install extension (release)
        run: maturin develop --release

      - name: Run tracked benchmarks
        # Match the harness shape from CLAUDE.md's performance protocol:
        # 100 rounds, warmup on, 20 warmup iterations. The JSON-dump path
        # is what compare_bench.py reads.
        run: |
          pytest tests/benchmarks/test_bench_core.py -m benchmark \
            --benchmark-min-rounds=100 \
            --benchmark-warmup=on --benchmark-warmup-iterations=20 \
            --benchmark-json=.bench-current.json

      - name: Compare against baseline
        # CI runs on Linux; the Linux baseline lives in current.linux.json.
        # macOS local development uses current.json (the platform divergence
        # is real — Linux GitHub runners run ~2-3x slower than Apple Silicon
        # for these benchmarks, so a single baseline can't gate both).
        run: |
          python scripts/compare_bench.py \
            tests/benchmarks/baselines/current.linux.json .bench-current.json \
            --metric min --threshold 20
