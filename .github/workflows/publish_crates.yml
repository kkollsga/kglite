name: Publish to crates.io
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

jobs:
  version-check:
    name: Check if kglite version needs publishing
    runs-on: ubuntu-latest
    outputs:
      should_publish_kglite: ${{ steps.check.outputs.should_publish_kglite }}
      should_publish_bolt: ${{ steps.check.outputs.should_publish_bolt }}
      should_publish_mcp: ${{ steps.check.outputs.should_publish_mcp }}
      should_publish_c: ${{ steps.check.outputs.should_publish_c }}
      should_publish_cli: ${{ steps.check.outputs.should_publish_cli }}
      kglite_version: ${{ steps.check.outputs.kglite_version }}
      bolt_version: ${{ steps.check.outputs.bolt_version }}
      mcp_version: ${{ steps.check.outputs.mcp_version }}
      c_version: ${{ steps.check.outputs.c_version }}
      cli_version: ${{ steps.check.outputs.cli_version }}
    steps:
      - uses: actions/checkout@v7
      - name: Check kglite + kglite-bolt-server + kglite-mcp-server + kglite-c versions against crates.io
        id: check
        run: |
          # Version is single-sourced in [workspace.package] (root Cargo.toml);
          # every member crate inherits it via `version.workspace = true`, so
          # all five share one value. The per-crate Cargo.tomls no longer carry
          # a literal version — read the root table.
          WS_VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
          KG_VERSION=$WS_VERSION
          BS_VERSION=$WS_VERSION
          MS_VERSION=$WS_VERSION
          C_VERSION=$WS_VERSION
          CLI_VERSION=$WS_VERSION
          echo "kglite_version=$KG_VERSION" >> $GITHUB_OUTPUT
          echo "bolt_version=$BS_VERSION" >> $GITHUB_OUTPUT
          echo "mcp_version=$MS_VERSION" >> $GITHUB_OUTPUT
          echo "c_version=$C_VERSION" >> $GITHUB_OUTPUT
          echo "cli_version=$CLI_VERSION" >> $GITHUB_OUTPUT
          echo "kglite Cargo.toml version:              $KG_VERSION"
          echo "kglite-bolt-server Cargo.toml version:  $BS_VERSION"
          echo "kglite-mcp-server Cargo.toml version:   $MS_VERSION"
          echo "kglite-c Cargo.toml version:            $C_VERSION"
          echo "kglite-cli Cargo.toml version:          $CLI_VERSION"

          # crates.io API: 200 if version exists, 404 if not, 403 if
          # rate-limited or User-Agent missing. We use HTTP 404 as the
          # only "publish" signal — anything else (200, 403, 5xx)
          # means "already exists or I can't tell, skip to be safe".
          # Without this guard, a rate-limit 403 would be treated as
          # "not 200 → not published → publish" and `cargo publish`
          # would error with "crate X@Y already exists on crates.io
          # index" because it actually IS already there.
          #
          # The User-Agent header is required by crates.io's API
          # policy — anonymous requests can get rejected with 403
          # even before hitting the rate limit. UA must include a
          # contact email per crates.io's docs.
          UA="kglite-ci/0.10.1 (https://github.com/kkollsga/kglite)"
          KG_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "$UA" "https://crates.io/api/v1/crates/kglite/$KG_VERSION")
          BS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "$UA" "https://crates.io/api/v1/crates/kglite-bolt-server/$BS_VERSION")
          MS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "$UA" "https://crates.io/api/v1/crates/kglite-mcp-server/$MS_VERSION")
          C_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "$UA" "https://crates.io/api/v1/crates/kglite-c/$C_VERSION")
          CLI_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "$UA" "https://crates.io/api/v1/crates/kglite-cli/$CLI_VERSION")

          if [ "$KG_STATUS" = "404" ]; then
            echo "kglite $KG_VERSION not on crates.io (HTTP 404) — will publish"
            echo "should_publish_kglite=true" >> $GITHUB_OUTPUT
          else
            echo "kglite $KG_VERSION already on crates.io or unverifiable (HTTP $KG_STATUS) — skipping publish"
            echo "should_publish_kglite=false" >> $GITHUB_OUTPUT
          fi

          if [ "$BS_STATUS" = "404" ]; then
            echo "kglite-bolt-server $BS_VERSION not on crates.io (HTTP 404) — will publish"
            echo "should_publish_bolt=true" >> $GITHUB_OUTPUT
          else
            echo "kglite-bolt-server $BS_VERSION already on crates.io or unverifiable (HTTP $BS_STATUS) — skipping publish"
            echo "should_publish_bolt=false" >> $GITHUB_OUTPUT
          fi

          if [ "$MS_STATUS" = "404" ]; then
            echo "kglite-mcp-server $MS_VERSION not on crates.io (HTTP 404) — will publish"
            echo "should_publish_mcp=true" >> $GITHUB_OUTPUT
          else
            echo "kglite-mcp-server $MS_VERSION already on crates.io or unverifiable (HTTP $MS_STATUS) — skipping publish"
            echo "should_publish_mcp=false" >> $GITHUB_OUTPUT
          fi

          if [ "$C_STATUS" = "404" ]; then
            echo "kglite-c $C_VERSION not on crates.io (HTTP 404) — will publish"
            echo "should_publish_c=true" >> $GITHUB_OUTPUT
          else
            echo "kglite-c $C_VERSION already on crates.io or unverifiable (HTTP $C_STATUS) — skipping publish"
            echo "should_publish_c=false" >> $GITHUB_OUTPUT
          fi

          if [ "$CLI_STATUS" = "404" ]; then
            echo "kglite-cli $CLI_VERSION not on crates.io (HTTP 404) — will publish"
            echo "should_publish_cli=true" >> $GITHUB_OUTPUT
          else
            echo "kglite-cli $CLI_VERSION already on crates.io or unverifiable (HTTP $CLI_STATUS) — skipping publish"
            echo "should_publish_cli=false" >> $GITHUB_OUTPUT
          fi

  ci-gate:
    name: Wait for CI + wheel build to pass
    needs: [version-check]
    if: needs.version-check.outputs.should_publish_kglite == 'true' || needs.version-check.outputs.should_publish_bolt == 'true' || needs.version-check.outputs.should_publish_mcp == 'true' || needs.version-check.outputs.should_publish_c == 'true' || needs.version-check.outputs.should_publish_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      # Wait on the single CI aggregate gate (ci.yml's `ci-success` job, which
      # `needs` every CI job and fails if any failed). Replaces the old
      # per-check allowlist so any failing CI job blocks the crates.io publish —
      # crates.io publishes are permanent, so a green-but-incomplete gate is the
      # worst case (the gap that shipped 0.11.6 while the free-threading job was
      # red).
      #
      # Poll the push-triggered CI workflow run directly. A commit can also
      # have a pull-request CI run with the same check names, so selecting a
      # commit-level check is ambiguous. This loop waits up to 45 min.
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          deadline=$(( $(date +%s) + 2700 ))
          while :; do
            line=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&event=push&per_page=10" \
              -q '.workflow_runs[0] | "\(.status) \(.conclusion // "")"' \
              2>/dev/null | head -n1 || true)
            status=${line%% *}
            conclusion=${line#* }
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "✅ CI success"
                exit 0
              fi
              echo "🔴 CI success concluded: $conclusion"
              exit 1
            fi
            [ -n "$status" ] && echo "Main CI: $status…" \
              || echo "Main CI run not registered yet…"
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::timed out waiting for the main CI run"
              exit 1
            fi
            sleep 20
          done
      # Wait for the per-OS wheel builds. Crates.io publishes are
      # permanent — if the wheel matrix would break on a kglite
      # change, we want to know BEFORE publishing kglite the crate.
      #
      # `check-regexp` (not `check-name`) so the wait also matches
      # the UNRENDERED matrix template name `Build wheel - ${{...}}`
      # that appears when the wheels workflow is skipped entirely
      # (e.g. the wheel version is already on PyPI, so the version-
      # check job decides not to run). Without the regexp, wait-on-
      # check-action exits with "The requested check was never run
      # against this ref, exiting..." because the rendered per-matrix
      # names (e.g. `Build wheel - ubuntu-latest - x86_64-...`) only
      # exist when the workflow actually ran.
      #
      # The negative lookahead excludes the *best-effort* Linux-aarch64
      # cross-build legs (`build-linux-arm`, `continue-on-error: true` —
      # "absent until the next release fixes it"). Their `failure`
      # conclusion must NOT block crates.io, exactly as the PyPI publish
      # tolerates them (it gates on build-native/build-linux only). Without
      # this, a flaky aarch64 cross-build (e.g. `ring` failing to assemble
      # in the manylinux2014-cross:aarch64 image) wedges the whole
      # crates.io publish. macOS aarch64 (a must-pass `build-native` leg)
      # is NOT excluded — only `aarch64-unknown-linux`.
      - name: Wait for wheel build matrix
        uses: lewagon/wait-on-check-action@v1.8.0
        with:
          ref: ${{ github.sha }}
          check-regexp: '^Build wheel - (?!.*aarch64-unknown-linux).*$'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30
          allowed-conclusions: success,skipped

  publish:
    name: Publish to crates.io
    needs: [version-check, ci-gate]
    if: needs.version-check.outputs.should_publish_kglite == 'true' || needs.version-check.outputs.should_publish_bolt == 'true' || needs.version-check.outputs.should_publish_mcp == 'true' || needs.version-check.outputs.should_publish_c == 'true' || needs.version-check.outputs.should_publish_cli == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "publish-${{ needs.version-check.outputs.kglite_version }}"

      # 1. Publish kglite (the core crate).
      # `--locked` honours Cargo.lock for reproducibility.
      # CI has already unpacked the generated crate outside the workspace and
      # compiled its public `parallel-bz2` feature against registry deps.
      - name: Publish kglite
        if: needs.version-check.outputs.should_publish_kglite == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p kglite --locked

      # 2. Wait for crates.io's sparse index to surface the new
      # kglite version. The first version of this step polled
      # /api/v1/crates/kglite/<version> for HTTP=200 — that hit
      # crates.io's rate limit (30 requests in 10 min from the
      # same runner IP) and started getting HTTP=403, mistaken for
      # "not yet". Fixed by switching to a fixed sleep + an actual
      # `cargo` operation as the readiness probe. `cargo search`
      # against the sparse index uses the same resolver path the
      # downstream `cargo publish -p ...` will use, so once it
      # finds our crate the next publish will too.
      - name: Wait for crates.io index propagation (kglite)
        if: needs.version-check.outputs.should_publish_kglite == 'true' && (needs.version-check.outputs.should_publish_bolt == 'true' || needs.version-check.outputs.should_publish_mcp == 'true' || needs.version-check.outputs.should_publish_c == 'true')
        run: |
          VERSION="${{ needs.version-check.outputs.kglite_version }}"
          # crates.io's own docs note "an index update can take up
          # to 1 minute". 90s buys headroom without burning CI time.
          echo "Sleeping 90s for crates.io index propagation of kglite $VERSION..."
          sleep 90
          # Confirm via cargo's own resolver — if this finds the
          # version, downstream `cargo publish -p kglite-bolt-server`
          # will resolve `kglite = "0.10"` to it.
          for i in $(seq 1 5); do
            if cargo search kglite --limit 1 2>&1 | grep -E "^kglite = \"$VERSION\""; then
              echo "kglite $VERSION visible to cargo resolver (attempt $i)"
              exit 0
            fi
            echo "Not yet visible to cargo resolver (attempt $i), waiting 30s..."
            sleep 30
          done
          echo "WARNING: cargo search didn't find kglite $VERSION after 90s + 5×30s."
          echo "Proceeding anyway — `cargo publish` for the next crate will surface a"
          echo "real error if the index isn't ready."

      # 3. Publish kglite-bolt-server. Skipped if its version is
      # already on crates.io (bolt-server may bump independently of
      # kglite).
      - name: Publish kglite-bolt-server
        if: needs.version-check.outputs.should_publish_bolt == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p kglite-bolt-server --locked

      # 4. (Optional) Wait for kglite-bolt-server to surface in the
      # crates.io index. mcp-server doesn't depend on bolt-server,
      # so this isn't strictly required for correctness — but it
      # gives the index a settling window before the next publish.
      # Only fires when BOTH bolt and mcp are publishing this run.
      - name: Wait for crates.io index propagation (kglite-bolt-server)
        if: needs.version-check.outputs.should_publish_bolt == 'true' && needs.version-check.outputs.should_publish_mcp == 'true'
        run: |
          # mcp-server doesn't depend on bolt-server, so this wait
          # is purely cosmetic spacing. 60s sleep, no API polling
          # (see the kglite wait step's comment for the 403/rate-limit
          # rationale).
          sleep 60

      # 5. Publish kglite-mcp-server. Skipped if its version is
      # already on crates.io (mcp-server may bump independently).
      # Pyo3 is no longer in the dep tree as of 0.10.1 — see the
      # lift in `kglite::api::handle::*`.
      - name: Publish kglite-mcp-server
        if: needs.version-check.outputs.should_publish_mcp == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p kglite-mcp-server --locked

      # 6. (Optional) Wait before publishing kglite-c. Like the
      # bolt → mcp wait above, this is cosmetic spacing — kglite-c
      # only depends on `kglite`, not on bolt-server or mcp-server.
      # Only fires when BOTH mcp and c are publishing this run.
      - name: Wait for crates.io index propagation (kglite-mcp-server)
        if: needs.version-check.outputs.should_publish_mcp == 'true' && needs.version-check.outputs.should_publish_c == 'true'
        run: sleep 60

      # 7. Publish kglite-c (C ABI crate for non-Rust bindings).
      # Skipped if its version is already on crates.io. The cdylib +
      # staticlib artifacts are NOT published here — crates.io
      # publishes the source crate; consumers run `cargo build` to
      # produce the platform library. The generated header is committed
      # under crates/kglite-c/include/ and ships in the source crate.
      # Precompiled C ABI libraries are not release assets today.
      - name: Publish kglite-c
        if: needs.version-check.outputs.should_publish_c == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p kglite-c --locked

      # 8. Publish kglite-cli (the `kglite` interactive shell binary).
      # Depends only on `kglite`, so no extra index-propagation wait is
      # needed beyond the kglite one above (and when only kglite-cli is
      # new in a later run, kglite is already on crates.io). Skipped if
      # its version is already published.
      - name: Publish kglite-cli
        if: needs.version-check.outputs.should_publish_cli == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p kglite-cli --locked
