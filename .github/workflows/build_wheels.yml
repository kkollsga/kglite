name: Build and Publish Python Wheels
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch: # Allow manual triggering

jobs:
  version-check:
    name: Check if version needs publishing
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Check PyPI project storage budget
        run: >-
          python scripts/check_pypi_storage.py
          --project kglite
          --project-limit-bytes 10000000000
          --action-threshold 0.80
          --reserve-bytes 250000000
      - name: Check version against PyPI
        id: check
        run: |
          # The version is single-sourced in [workspace.package] in the root
          # Cargo.toml; every member crate (incl. the wheel crate kglite-py)
          # inherits it via `version.workspace = true`. Read the root table —
          # the per-crate Cargo.tomls no longer carry a literal version.
          VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d '"' -f 2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "kglite-py Cargo.toml version: $VERSION"

          # HTTP 404 is the only "publish this version" signal —
          # 200 means it's already there, anything else (403, 5xx)
          # means we can't tell, fail safe to don't-publish. Mirrors
          # the same logic in publish_crates.yml's version-check.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -A "kglite-ci/0.10.1 (https://github.com/kkollsga/kglite)" \
            "https://pypi.org/pypi/kglite/$VERSION/json")
          if [ "$HTTP_STATUS" = "404" ]; then
            echo "Version $VERSION not on PyPI (HTTP 404) — will build and publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION already on PyPI or unverifiable (HTTP $HTTP_STATUS) — skipping build"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

  ci-gate:
    name: Wait for CI to pass
    needs: [version-check]
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      # Wait on the single CI aggregate gate (ci.yml's `ci-success` job, which
      # `needs` every CI job and fails if any failed). This replaces the old
      # per-check allowlist — any new/failing CI job now blocks the release
      # automatically, instead of slipping through because it wasn't listed.
      #
      # Poll the push-triggered CI workflow run directly. A commit can also
      # have a pull-request CI run with the same check names, so selecting a
      # commit-level check is ambiguous. Waits up to 45 min.
      - name: Wait for CI to pass
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          deadline=$(( $(date +%s) + 2700 ))
          while :; do
            line=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&event=push&per_page=10" \
              -q '.workflow_runs[0] | "\(.status) \(.conclusion // "")"' \
              2>/dev/null | head -n1 || true)
            status=${line%% *}
            conclusion=${line#* }
            if [ "$status" = "completed" ]; then
              if [ "$conclusion" = "success" ]; then
                echo "✅ CI success"
                exit 0
              fi
              echo "🔴 CI success concluded: $conclusion"
              exit 1
            fi
            [ -n "$status" ] && echo "Main CI: $status…" \
              || echo "Main CI run not registered yet…"
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::timed out waiting for the main CI run"
              exit 1
            fi
            sleep 20
          done

  # Windows + macOS build natively (one abi3 wheel per target). macOS
  # builds both arm64 (native on the arm runner) and x86_64 (cross —
  # Apple ships both SDKs, so `--target x86_64-apple-darwin` just works).
  # The abi3-py310 extension and its bundled MCP entry point serve all
  # Python 3.10+ versions — one wheel per target, no per-Python matrix.
  # See docs/python/guides/mcp-servers.md.
  build-native:
    name: Build wheel - ${{ matrix.os }} - ${{ matrix.target }}
    # Build in PARALLEL with CI (don't wait on ci-gate). The `publish` job
    # still gates on ci-gate succeeding, so nothing reaches PyPI before CI is
    # green — this just overlaps the slow wheel compile with CI instead of
    # starting it ~12m later. `if` keeps builds release-only (previously the
    # skipped ci-gate cascaded a skip onto the build jobs).
    needs: [version-check]
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python 3.10 (abi3 floor)
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Force cargo PATH precedence (macOS rustup-init shim workaround)
        # macos-latest images ship a `rustup-init` shim at
        # /usr/local/bin/cargo that takes precedence over the toolchain
        # dtolnay/rust-toolchain installs at ~/.cargo/bin/cargo. When
        # maturin invokes `cargo metadata`, the shim resolves first and
        # rejects `metadata` as an unknown argument ("unexpected
        # argument 'metadata' found"). Hit on 0.9.26 (one rerun cleared
        # it as transient) and again on 0.9.29 (two consecutive
        # failures — not transient anymore). Prepending ~/.cargo/bin
        # to GITHUB_PATH forces the real toolchain to win.
        if: matrix.os == 'macos-latest'
        run: echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash
      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: "wheel-${{ matrix.target }}-0922"
      - name: Install Maturin
        run: pip install maturin
      - name: Build abi3 wheel
        run: |
          if (!(Test-Path -Path "wheels")) { New-Item -ItemType Directory -Path "wheels" }
          maturin build --release --target ${{ matrix.target }} --out wheels
        shell: pwsh
      - name: List build directory
        run: Get-ChildItem -Recurse wheels
        shell: pwsh
      - name: Inventory wheel contents and entry points
        run: python scripts/check_wheel_artifact.py "wheels/*.whl"
      - name: Smoke-test installed wheel (Windows x86_64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: pwsh
        run: |
          python -m venv .wheel-smoke
          $wheel = (Get-ChildItem wheels\*.whl | Select-Object -First 1).FullName
          .\.wheel-smoke\Scripts\python -m pip install $wheel
          .\.wheel-smoke\Scripts\python scripts/smoke_installed_wheel.py
      - name: Smoke-test installed wheel (macOS arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .wheel-smoke
          ./.wheel-smoke/bin/python -m pip install wheels/*.whl
          ./.wheel-smoke/bin/python scripts/smoke_installed_wheel.py
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: wheels/*.whl

      # ---- pyarrow-coexistence canary (macOS arm64 only) ----
      # The dual-mimalloc teardown SIGSEGV this guards (kglite's Rust global
      # mimalloc vs pyarrow's bundled copy on CPython 3.14) was ONLY ever
      # observed on macOS arm64. ci.yml runs the same canary
      # (tests/test_pyarrow_coexistence.py) on a Linux py3.14 leg; this closes
      # the macOS blind spot by exercising it on the native arm64 runner BEFORE
      # any wheel is published (the `publish` job needs build-native == success,
      # so a nonzero exit here blocks the release).
      #
      # Scoped to `aarch64-apple-darwin`: the x86_64 cell cross-builds on the
      # arm64 runner and can't run its wheel; the windows cell is a different OS.
      - name: Set up Python 3.14 for the pyarrow-coexistence canary
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - name: pyarrow-coexistence canary (macOS arm64)
        # Install the wheel we just built (abi3-py310 → runs on 3.14) into a
        # fresh venv alongside UNPINNED pyarrow. Unpinned BY DESIGN, mirroring
        # ci.yml's Linux leg: we WANT the newest pyarrow/CPython allocator
        # behaviour so a future change that reintroduces the clash trips here
        # early. A nonzero exit (139 / SIGSEGV at teardown) fails the job.
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .canary-venv
          ./.canary-venv/bin/python -m pip install --upgrade pip
          ./.canary-venv/bin/python -m pip install wheels/*.whl pyarrow pytest pytest-timeout
          ./.canary-venv/bin/python -m pytest --noconftest tests/test_pyarrow_coexistence.py -v

  # Linux builds inside the manylinux2014 container (glibc 2.17) via
  # maturin-action, NOT a bare `maturin build` on the runner — a bare
  # build tags the wheel with the runner's glibc (0.10.28 shipped
  # `manylinux_2_39`, which pip refuses to install on anything older than
  # Ubuntu 24.04, forcing downstreams to self-host; operator B8). The
  # container also cross-builds aarch64 (Graviton / Apple-via-Docker) and
  # the musllinux_1_2 wheels for Alpine.
  # x86_64 Linux — the must-pass cells (gnu manylinux2014 + musl). A
  # failure here blocks the release; we never publish a Linux-x86_64
  # set missing the primary glibc wheel.
  build-linux:
    name: Build wheel - linux - ${{ matrix.target }} (${{ matrix.manylinux }})
    # Build in parallel with CI; publish stays gated on ci-gate (see build-native).
    needs: [version-check]
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            manylinux: '2014'
          - target: x86_64-unknown-linux-musl
            manylinux: musllinux_1_2
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build abi3 wheel (manylinux/musllinux container)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out wheels
      - name: List build directory
        run: ls -la wheels
      - name: Inventory wheel contents and entry points
        run: python scripts/check_wheel_artifact.py "wheels/*.whl"
      - name: Smoke-test installed manylinux wheel
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          python -m venv .wheel-smoke
          ./.wheel-smoke/bin/python -m pip install wheels/*.whl
          ./.wheel-smoke/bin/python scripts/smoke_installed_wheel.py
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: wheels/*.whl

  # aarch64 Linux — extra coverage built via QEMU/cross. These are the
  # fragile combos (native C deps cross-compiling to aarch64, esp.
  # musl), so the job is best-effort: `continue-on-error` keeps a
  # cross-build failure from blocking the release. Any cell that *does*
  # build uploads its wheel and gets published; a broken one is simply
  # absent until the next release fixes it.
  build-linux-arm:
    name: Build wheel - linux - ${{ matrix.target }} (${{ matrix.manylinux }})
    # Build in parallel with CI; publish stays gated on ci-gate (see build-native).
    needs: [version-check]
    if: needs.version-check.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            manylinux: '2_28'
          - target: aarch64-unknown-linux-musl
            manylinux: musllinux_1_2
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build abi3 wheel (manylinux/musllinux container)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out wheels
          # gnu-aarch64 builds on the manylinux_2_28 cross image (gcc 12),
          # NOT 2014: the ancient 2014 cross gcc (4.8.5) can't cross-build
          # this wheel's C deps for aarch64. It `#error`ed on `ring`'s `.S`
          # asm (no `__ARM_ARCH`) in 0.11.0, and then choked on
          # `libmimalloc-sys` passing `-Wno-error=date-time` (gcc <4.9 has
          # no `-Wdate-time`). A modern toolchain clears the whole class of
          # old-gcc cross failures in one move. Trade-off: this wheel's glibc
          # floor rises 2.17 -> 2.28 (RHEL8 / Ubuntu 18.10+) — fine for
          # aarch64 (recent deployments) and strictly better than today's
          # absent wheel. x86_64 stays on 2014 for broad compat; the musl
          # leg builds fine and is unchanged. The `__ARM_ARCH` define below
          # is retained as harmless belt-and-suspenders (gcc 12 already
          # defines it; the export is gnu-target-scoped, a no-op for musl).
          before-script-linux: |
            export CFLAGS_aarch64_unknown_linux_gnu="${CFLAGS_aarch64_unknown_linux_gnu:-} -D__ARM_ARCH=8"
      - name: List build directory
        run: ls -la wheels
      - name: Inventory wheel contents and entry points
        run: python scripts/check_wheel_artifact.py "wheels/*.whl"
      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: wheels/*.whl

  publish:
    name: Publish to PyPI
    needs: [version-check, ci-gate, build-native, build-linux, build-linux-arm]
    # Run once CI has passed (ci-gate) AND the must-pass builds are green,
    # regardless of the best-effort aarch64 job's result — a `continue-on-error`
    # job that fails still counts as a failed dependency, which would otherwise
    # *skip* publish. `always()` + explicit gates let publish proceed with
    # whatever wheels exist (skip-existing handles partial sets). The
    # `ci-gate.result == 'success'` term is the safety wall: builds now run in
    # parallel with CI, so this is the single point that keeps an un-CI'd commit
    # from ever reaching PyPI.
    if: >-
      always() &&
      needs.version-check.outputs.should_publish == 'true' &&
      needs.ci-gate.result == 'success' &&
      needs.build-native.result == 'success' &&
      needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write  # Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: Display structure of downloaded files
        run: find dist -type f
      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          # Extract the section between "## [VERSION]" and the next "## [" heading
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "No changelog entry found for $VERSION, using auto-generated notes"
            echo "has_notes=false" >> $GITHUB_OUTPUT
          else
            echo "has_notes=true" >> $GITHUB_OUTPUT
            echo "$NOTES" > /tmp/release_notes.md
          fi
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
          password: ${{ secrets.PYPI_API_TOKEN }}
      - name: Create GitHub Release (with changelog)
        if: steps.changelog.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.whl
          body_path: /tmp/release_notes.md
          tag_name: v${{ needs.version-check.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create GitHub Release (auto-generated)
        if: steps.changelog.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*.whl
          generate_release_notes: true
          tag_name: v${{ needs.version-check.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
