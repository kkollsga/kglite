# Hand-rolled GitHub traffic collector — NO third-party Actions.
#
# GitHub keeps repository traffic (views / clones / referrers) for only 14 days.
# This snapshots them daily via GitHub's own Traffic API (the `gh` CLI) and
# accumulates them as CSVs + a PDF into the PRIVATE `kkollsga/statistics` repo,
# under a per-repo dir (this repo lands in `statistics/<repo-name>/`). So the
# numbers stay private, this public repo stays clean, and one statistics repo
# aggregates every source repo. The only moving parts are GitHub's own
# `actions/checkout`, the `gh` CLI, this repo's `scripts/repo_traffic_stats.py`,
# and matplotlib — no community action ever sees the token.
#
# ── One-time setup (repo owner) ───────────────────────────────────────────────
#   The private data repo `kkollsga/statistics` already exists. Remaining:
#   1. Create a fine-grained PAT with:
#        • this repo (kglite)        → Administration: Read     (traffic API)
#        • kkollsga/statistics       → Contents: Read and write  (store CSV/PDF)
#      Add it as a repository secret named  TRAFFIC_TOKEN.
#   2. (optional) Override the data repo via a repo variable  TRAFFIC_DATA_REPO.
#
# ── Adding another repo later ─────────────────────────────────────────────────
#   Copy this workflow + scripts/repo_traffic_stats.py into that repo, add its
#   own TRAFFIC_TOKEN. It auto-writes to `statistics/<that-repo-name>/`.

name: repo-traffic-stats

on:
  schedule:
    - cron: "27 14 * * *" # daily at 14:27 UTC — ≈16:27 Norway (CEST) / 15:27 (CET). Afternoon so the day's traffic is fully populated before we snapshot. Off-the-hour minute avoids GitHub's top-of-hour scheduling delays. (UTC is fixed; the Norway clock-time drifts ±1h across DST.)
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7 # GitHub's own action — only to get the collector script

      - name: install matplotlib (PDF rendering)
        run: pip install --quiet matplotlib

      - name: collect traffic → CSV + PDF → push to the private statistics repo
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
          DATA_REPO: ${{ vars.TRAFFIC_DATA_REPO || 'kkollsga/statistics' }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "::error::TRAFFIC_TOKEN secret not set — see this workflow's header for setup."
            exit 1
          fi
          repo_name="${GITHUB_REPOSITORY##*/}"   # e.g. kglite → data lands in statistics/<repo_name>/
          # Clone the private data repo (keeps its history; an empty repo is fine).
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${DATA_REPO}.git" data
          git -C data config user.name  "github-actions[bot]"
          git -C data config user.email "github-actions[bot]@users.noreply.github.com"
          # Upsert this repo's daily series + render its PDF, namespaced by repo.
          python scripts/repo_traffic_stats.py --repo "${GITHUB_REPOSITORY}" --data-dir "data/${repo_name}"
          cd data
          git add -A
          if git diff --cached --quiet; then
            echo "no traffic changes today"
          else
            git commit -q -m "${repo_name}: traffic snapshot $(date -u +%F)"
            git push origin HEAD:main
          fi
